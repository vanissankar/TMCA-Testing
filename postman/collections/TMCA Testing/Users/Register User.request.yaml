$kind: http-request
description: Admin and team_admin only. Admin can create all roles. Team admin
  can only create team_lead and team_member in their own team.
url: "{{baseUrl}}/users/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Akash",
      "email": "akash2176e@example.com",
      "password": "tmca@123",
      "role": "team_member",
      "team_id": "{{teamId}}",
      "phone": "+91-7305594291"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      if (json?.data?.id) pm.collectionVariables.set("userId", json.data.id);
    language: text/javascript
order: 1000
