$kind: http-request
description: Admin only. Creates a new organization.
url: "{{baseUrl}}/organizations/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "The Madras CA"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: >-
      const json = pm.response.json();

      if (json?.data?.id) pm.collectionVariables.set("organizationId",
      json.data.id);
    language: text/javascript
order: 1000
